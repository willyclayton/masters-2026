<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticker Animations V2 — Manual Scoreboard Style</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #006B54; --green-dark: #004D3C; --green-light: #E8F5F0;
    --gold: #C8A951; --gold-light: #FBF5E6;
    --red: #C0392B; --bg: #FAFAF7; --text: #1A1A1A; --text2: #4A4A4A; --muted: #8A8A8A; --border: #E5E5DC;
    --pine: #2D5A27; --pine-dark: #1E3E1A; --pine-border: #3D7A35; --amber: #F5E6B8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); }
  .heading { font-family: 'Cormorant Garamond', serif; }

  .top-bar { position: sticky; top: 0; z-index: 50; background: var(--green-dark); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; }
  .top-bar h1 { color: white; font-family: 'Cormorant Garamond', serif; font-size: 18px; }
  .top-bar span { color: var(--gold); font-size: 12px; letter-spacing: 2px; text-transform: uppercase; }

  .selector { max-width: 940px; margin: 32px auto 0; padding: 0 20px; }
  .selector-title { font-family: 'Cormorant Garamond', serif; font-size: 26px; text-align: center; margin-bottom: 6px; }
  .selector-sub { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 20px; line-height: 1.5; }
  .selector-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px, 1fr)); gap: 8px; }
  .selector-btn { padding: 10px 12px; border-radius: 8px; border: 2px solid var(--border); background: white; font-size: 13px; font-weight: 600; cursor: pointer; transition: all .15s; text-align: left; }
  .selector-btn:hover { border-color: var(--green); color: var(--green); }
  .selector-btn.active { border-color: var(--green); background: var(--green-light); color: var(--green); }
  .selector-btn .num { display: block; font-size: 10px; color: var(--muted); font-weight: 500; margin-bottom: 2px; }

  .mockup-wrap { max-width: 940px; margin: 24px auto 60px; padding: 0 20px; }
  .mockup { display: none; }
  .mockup.active { display: block; }

  .desc { background: var(--bg); border: 1px dashed var(--border); border-radius: 8px; padding: 14px; margin-top: 14px; font-size: 13px; color: var(--text2); line-height: 1.6; }
  .desc strong { color: var(--text); }

  .fake-header { background: var(--green); padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; }
  .fake-header h2 { color: white; font-family: 'Cormorant Garamond', serif; font-size: 16px; }
  .fake-body { border: 1px solid var(--border); border-top: 0; border-radius: 0 0 10px 10px; background: white; padding: 20px; min-height: 30px; color: var(--muted); font-size: 13px; text-align: center; }

  .controls { display: flex; align-items: center; gap: 12px; margin-top: 12px; justify-content: center; }
  .play-btn { padding: 6px 16px; border-radius: 6px; border: 1px solid var(--green); background: white; color: var(--green); font-size: 12px; font-weight: 600; cursor: pointer; }
  .play-btn:hover { background: var(--green-light); }
  .speed-label { font-size: 11px; color: var(--muted); }

  @keyframes pulse { 0%,100%{opacity:1}50%{opacity:.4} }
  .pulse { animation: pulse 2s infinite; }

  /* ── Ticker base ── */
  .ticker { border-bottom: 2px solid var(--green); background: white; border-radius: 10px 10px 0 0; overflow: hidden; }
  .ticker-inner { display: flex; align-items: stretch; }
  .badge { display: flex; align-items: center; gap: 5px; background: var(--green); padding: 7px 12px; flex-shrink: 0; }
  .badge span { font-size: 10px; color: white; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; }
  .badge .dot { width: 5px; height: 5px; border-radius: 50%; background: #4ADE80; }
  .leader { display: flex; align-items: center; gap: 6px; background: var(--green-light); border-right: 2px solid var(--green); padding: 6px 14px; flex-shrink: 0; }
  .leader .pos { font-size: 11px; font-weight: 800; color: var(--gold); }
  .leader .name { font-size: 13px; font-weight: 700; }
  .leader .score { font-size: 14px; font-weight: 800; color: var(--red); }
  .fan-area { flex: 1; min-width: 0; overflow: hidden; position: relative; height: 36px; }
  .fan-nav { display: flex; align-items: center; padding: 0 8px; flex-shrink: 0; }
  .fan-nav .dots { display: flex; gap: 4px; margin-right: 6px; }
  .fan-nav .d { width: 5px; height: 5px; border-radius: 50%; background: var(--border); transition: .3s; }
  .fan-nav .d.on { background: var(--green); }
  .arrow-btn { background: none; border: none; cursor: pointer; color: var(--green); font-size: 16px; padding: 4px; }

  .fan-row { display: flex; position: absolute; top: 0; left: 0; right: 0; height: 100%; }
  .cell { display: flex; align-items: center; gap: 5px; padding: 7px 12px; border-right: 1px solid var(--border); flex-shrink: 0; }
  .cell:last-child { border-right: none; }
  .cell .p { font-size: 10px; font-weight: 700; color: var(--muted); }
  .cell .n { font-size: 12px; font-weight: 600; color: var(--text2); }
  .cell .s { font-size: 12px; font-weight: 800; color: var(--red); }

  /* ── 1: Split-flap (classic) ── */
  .splitflap .cell { perspective: 200px; overflow: hidden; }
  .splitflap .cell-inner { display: flex; align-items: center; gap: 5px; transform-origin: center top; }
  @keyframes flapOut { 0%{transform:rotateX(0)}50%{transform:rotateX(-90deg)}50.01%{opacity:0}100%{opacity:0;transform:rotateX(-90deg)} }
  @keyframes flapIn { 0%{transform:rotateX(90deg);opacity:0}50%{transform:rotateX(90deg);opacity:0}50.01%{opacity:1}100%{transform:rotateX(0);opacity:1} }

  /* ── 2: Peel away (like lifting a card) ── */
  @keyframes peelOut { 0%{transform:rotateY(0);opacity:1}100%{transform:rotateY(60deg) scale(.9);opacity:0} }
  @keyframes peelIn { 0%{transform:rotateY(-60deg) scale(.9);opacity:0}100%{transform:rotateY(0);opacity:1} }

  /* ── 3: Slide slot (numbers rolling like a slot machine) ── */
  @keyframes slotOut { 0%{transform:translateY(0);opacity:1}100%{transform:translateY(-36px);opacity:0} }
  @keyframes slotIn { 0%{transform:translateY(36px);opacity:0}100%{transform:translateY(0);opacity:1} }

  /* ── 4: Physical slide (like slotting cards on a board) ── */
  @keyframes cardSlideOut { 0%{transform:translateX(0) translateY(0);opacity:1}30%{transform:translateX(0) translateY(-4px);opacity:1}100%{transform:translateX(0) translateY(-36px);opacity:0} }
  @keyframes cardSlideIn { 0%{transform:translateX(0) translateY(36px);opacity:0}70%{transform:translateX(0) translateY(2px);opacity:1}100%{transform:translateX(0) translateY(0);opacity:1} }

  /* ── 5: Magnetic snap (pulls from right with a sharp stop) ── */
  @keyframes magnetOut { 0%{transform:translateX(0)}100%{transform:translateX(-30px);opacity:0} }
  @keyframes magnetIn { 0%{transform:translateX(40px);opacity:0}85%{transform:translateX(-2px);opacity:1}100%{transform:translateX(0);opacity:1} }

  /* ── 6: Chalk erase/write ── */
  @keyframes chalkOut { 0%{opacity:1;filter:blur(0)}40%{opacity:.6;filter:blur(1px)}100%{opacity:0;filter:blur(3px)} }
  @keyframes chalkIn { 0%{opacity:0;filter:blur(3px)}60%{opacity:.6;filter:blur(1px)}100%{opacity:1;filter:blur(0)} }

  /* ── 7: Shutter (top/bottom blinds) ── */
  @keyframes shutterOut { 0%{clip-path:inset(0 0 0 0)}100%{clip-path:inset(50% 0 50% 0)} }
  @keyframes shutterIn { 0%{clip-path:inset(50% 0 50% 0)}100%{clip-path:inset(0 0 0 0)} }

  /* ── 8: Gravity drop (falls with acceleration) ── */
  @keyframes gravOut { 0%{transform:translateY(0);opacity:1}100%{transform:translateY(36px);opacity:0} }
  @keyframes gravIn { 0%{transform:translateY(-50px);opacity:0}70%{transform:translateY(2px);opacity:1}85%{transform:translateY(-1px)}100%{transform:translateY(0);opacity:1} }

  /* ── 9: Stamp press (like pressing letters into a board) ── */
  @keyframes stampOut { 0%{transform:scale(1);opacity:1}100%{transform:scale(1.1);opacity:0} }
  @keyframes stampIn { 0%{transform:scale(1.3);opacity:0}60%{transform:scale(.97);opacity:1}100%{transform:scale(1);opacity:1} }

  /* ── 10: Hand swap (slight arc like someone moving a placard) ── */
  @keyframes handOut { 0%{transform:translateY(0) rotate(0);opacity:1}40%{transform:translateY(-6px) rotate(-2deg);opacity:1}100%{transform:translateY(-30px) rotate(-5deg);opacity:0} }
  @keyframes handIn { 0%{transform:translateY(30px) rotate(3deg);opacity:0}60%{transform:translateY(1px) rotate(-0.5deg);opacity:1}100%{transform:translateY(0) rotate(0);opacity:1} }
</style>
</head>
<body>

<div class="top-bar">
  <h1 class="heading">Manual Scoreboard Animations</h1>
  <span>V2 · 10 Variations</span>
</div>

<div class="selector">
  <h2 class="selector-title heading">Augusta Manual Scoreboard Style</h2>
  <p class="selector-sub">Inspired by the green scoreboards at Augusta where workers physically slide number placards on and off. Each cell animates individually with stagger like a person updating them one at a time.</p>
  <div class="selector-grid">
    <button class="selector-btn active" onclick="show(0)"><span class="num">#1</span>Split-Flap</button>
    <button class="selector-btn" onclick="show(1)"><span class="num">#2</span>Peel Away</button>
    <button class="selector-btn" onclick="show(2)"><span class="num">#3</span>Slot Roll</button>
    <button class="selector-btn" onclick="show(3)"><span class="num">#4</span>Card Slide</button>
    <button class="selector-btn" onclick="show(4)"><span class="num">#5</span>Magnetic Snap</button>
    <button class="selector-btn" onclick="show(5)"><span class="num">#6</span>Chalk Wipe</button>
    <button class="selector-btn" onclick="show(6)"><span class="num">#7</span>Shutter Blinds</button>
    <button class="selector-btn" onclick="show(7)"><span class="num">#8</span>Gravity Drop</button>
    <button class="selector-btn" onclick="show(8)"><span class="num">#9</span>Stamp Press</button>
    <button class="selector-btn" onclick="show(9)"><span class="num">#10</span>Hand Swap</button>
  </div>
</div>

<div class="mockup-wrap">
<script>
const PAGES = [
  [{p:'2',n:'McIlroy',s:'-10'},{p:'3',n:'Åberg',s:'-9'},{p:'4',n:'Schauffele',s:'-8'},{p:'5',n:'Morikawa',s:'-7'},{p:'6',n:'Rahm',s:'-6'}],
  [{p:'7',n:'DeChambeau',s:'-5'},{p:'8',n:'Hovland',s:'-4'},{p:'9',n:'Cantlay',s:'-3'},{p:'T10',n:'Koepka',s:'-3'},{p:'T10',n:'Fleetwood',s:'-3'}],
  [{p:'12',n:'Matsuyama',s:'-2'},{p:'13',n:'Theegala',s:'-2'},{p:'14',n:'Rose',s:'-1'},{p:'15',n:'Lowry',s:'-1'},{p:'T16',n:'Spieth',s:'E'}],
];

// [outAnim, inAnim, staggerMs, outDur, inDur, inDelay] per variation
const ANIMS = [
  { out:'flapOut',   inp:'flapIn',   stagger:140, outDur:400, inDur:400, inDelay:200, desc:'Split-Flap', note:'The airport departure board / old-school scoreboard classic. Each cell flips on the X-axis — top half falls forward revealing the new name behind it. Staggered left-to-right like a mechanical display clicking through. The most iconic "manual scoreboard" animation.' },
  { out:'peelOut',   inp:'peelIn',   stagger:150, outDur:350, inDur:400, inDelay:180, desc:'Peel Away', note:'Like someone lifting a name placard off the board and sliding a new one in. Y-axis rotation with slight scale-down. Feels like physical cards being peeled off and replaced. Deliberate and tactile.' },
  { out:'slotOut',   inp:'slotIn',   stagger:120, outDur:300, inDur:350, inDelay:150, desc:'Slot Roll', note:'Numbers roll upward and out like a slot machine or odometer, new names roll in from below. Tight, mechanical, precise. Mimics the vertical number slides on the actual Augusta scoreboard where workers push numbers up and down in tracks.' },
  { out:'cardSlideOut', inp:'cardSlideIn', stagger:180, outDur:350, inDur:400, inDelay:200, desc:'Card Slide', note:'Old name lifts up slightly (as if gripped) then slides out the top. New name slides in from below and settles with a subtle overshoot. The slight pause between lift and slide mimics a human hand pulling a card. Most realistic "person changing a scoreboard" feel.' },
  { out:'magnetOut', inp:'magnetIn',  stagger:100, outDur:250, inDur:300, inDelay:130, desc:'Magnetic Snap', note:'Names snap out to the left quickly, and new ones pull in from the right with a sharp magnetic stop (slight overshoot). Like lettered tiles being magnetically snapped into place on a board. Quick but with satisfying precision.' },
  { out:'chalkOut',  inp:'chalkIn',   stagger:160, outDur:400, inDur:450, inDelay:200, desc:'Chalk Wipe', note:'Old text blurs and fades like chalk being wiped off a board, then new text materializes from a blur as if being written fresh. The blur transition gives a handmade, analog quality. Like a scorer erasing and rewriting names.' },
  { out:'shutterOut',inp:'shutterIn', stagger:130, outDur:300, inDur:350, inDelay:150, desc:'Shutter Blinds', note:'Top and bottom blinds close to a thin horizontal line, then reopen revealing the new name. Like a tiny window shutter on each cell. Mechanical, precise, with the "reveal" moment creating anticipation. Inspired by old railway station displays.' },
  { out:'gravOut',   inp:'gravIn',    stagger:150, outDur:250, inDur:400, inDelay:130, desc:'Gravity Drop', note:'Old name drops down with gravity acceleration. New name drops from above with a realistic settle (slight bounce on landing). Feels like physical name plates falling under gravity — the weight and physics sell the "manual" feel.' },
  { out:'stampOut',  inp:'stampIn',   stagger:120, outDur:250, inDur:350, inDelay:130, desc:'Stamp Press', note:'Old name scales up slightly and vanishes (as if pulled toward you), new name stamps down from a larger scale with a subtle settle. Like a rubber stamp pressing names onto the board. Punchy, decisive. Each placement feels final.' },
  { out:'handOut',   inp:'handIn',    stagger:200, outDur:400, inDur:450, inDelay:220, desc:'Hand Swap', note:'Old name lifts with a slight arc and rotation (like a hand picking up a card at an angle), then the new name is placed in from below with a gentle counter-rotation and settle. The slowest, most deliberate animation — truly looks like a person carefully placing each name. The rotation sells the human hand movement.' },
];

let currentMockup = 0;
let timers = [];
const pageState = Array(10).fill(0);

function buildCells(page) {
  return page.map(c => `<div class="cell"><span class="p">${c.p}</span><span class="n">${c.n}</span><span class="s">${c.s}</span></div>`).join('');
}

function makeTicker(idx) {
  const a = ANIMS[idx];
  return `
  <div class="ticker" id="ticker-${idx}">
    <div class="ticker-inner">
      <div class="badge"><span class="dot pulse"></span><span>R3</span></div>
      <div class="leader"><span class="pos">1</span><span class="name">Scheffler</span><span class="score">-12</span></div>
      <div class="fan-area" id="fanarea-${idx}">
        <div class="fan-row" id="fan-${idx}">${buildCells(PAGES[0])}</div>
      </div>
      <div class="fan-nav">
        <div class="dots" id="dots-${idx}"><span class="d on"></span><span class="d"></span><span class="d"></span></div>
        <button class="arrow-btn" onclick="manualNext(${idx})">›</button>
      </div>
    </div>
  </div>
  <div class="fake-header"><h2 class="heading">The Green Jacket Lab</h2><span style="font-size:18px;">⛳</span></div>
  <div class="fake-body">Page content...</div>
  <div class="controls">
    <button class="play-btn" onclick="replay(${idx})">Replay</button>
    <span class="speed-label">Auto-fans every 4s · stagger: ${a.stagger}ms</span>
  </div>
  <div class="desc"><strong>#${idx+1} ${a.desc}</strong> — ${a.note}</div>`;
}

const wrap = document.querySelector('.mockup-wrap');
for (let i = 0; i < 10; i++) {
  const div = document.createElement('div');
  div.className = 'mockup' + (i === 0 ? ' active' : '');
  div.id = 'm' + i;
  div.innerHTML = makeTicker(i);
  wrap.appendChild(div);
}

function animateFan(idx, pageNum) {
  const area = document.getElementById('fanarea-' + idx);
  const dots = document.getElementById('dots-' + idx);
  if (!area || !dots) return;

  const a = ANIMS[idx];
  const oldRow = area.querySelector('.fan-row');
  const oldCells = oldRow ? oldRow.querySelectorAll('.cell') : [];

  // Animate out old cells with stagger
  oldCells.forEach((cell, i) => {
    cell.style.animation = `${a.out} ${a.outDur}ms ease ${i * a.stagger}ms forwards`;
  });

  // After all old cells are done, bring in new
  const totalOutTime = (oldCells.length - 1) * a.stagger + a.outDur;

  setTimeout(() => {
    // Create new row
    const newRow = document.createElement('div');
    newRow.className = 'fan-row';
    newRow.innerHTML = buildCells(PAGES[pageNum]);
    area.innerHTML = '';
    area.appendChild(newRow);

    // Animate in new cells with stagger
    const newCells = newRow.querySelectorAll('.cell');
    newCells.forEach((cell, i) => {
      cell.style.opacity = '0';
      cell.style.animation = `${a.inp} ${a.inDur}ms ease ${i * a.stagger + a.inDelay}ms forwards`;
    });
  }, totalOutTime * 0.6); // overlap slightly for smoothness

  dots.querySelectorAll('.d').forEach((d, i) => d.classList.toggle('on', i === pageNum));
  pageState[idx] = pageNum;
}

function manualNext(idx) {
  const next = (pageState[idx] + 1) % PAGES.length;
  animateFan(idx, next);
}

function replay(idx) {
  clearTimersFor(idx);
  const area = document.getElementById('fanarea-' + idx);
  if (area) {
    area.innerHTML = `<div class="fan-row">${buildCells(PAGES[0])}</div>`;
  }
  pageState[idx] = 0;
  const dots = document.getElementById('dots-' + idx);
  if (dots) dots.querySelectorAll('.d').forEach((d, i) => d.classList.toggle('on', i === 0));
  startAuto(idx);
}

function clearTimersFor(idx) {
  timers.filter(t => t.idx === idx).forEach(t => clearInterval(t.id));
  timers = timers.filter(t => t.idx !== idx);
}

function startAuto(idx) {
  clearTimersFor(idx);
  const id = setInterval(() => {
    const next = (pageState[idx] + 1) % PAGES.length;
    animateFan(idx, next);
  }, 4000);
  timers.push({ idx, id });
}

function show(idx) {
  document.querySelectorAll('.mockup').forEach((m, i) => m.classList.toggle('active', i === idx));
  document.querySelectorAll('.selector-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
  currentMockup = idx;
  timers.forEach(t => clearInterval(t.id));
  timers = [];
  replay(idx);
  document.querySelector('.mockup-wrap').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

startAuto(0);
</script>
</div>
</body>
</html>
